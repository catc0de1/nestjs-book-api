services:
  db:
    image: postgres:16
    restart: no
    container_name: book-pg-test
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 2s

  search:
    image: getmeili/meilisearch:v1.35.1
    restart: no
    container_name: book-search-test
    ports:
      - "${MEILI_PORT}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV}
    tmpfs:
      - /meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 2s
