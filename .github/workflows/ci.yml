name: CI

on:
  push:
    branches:
      - main
      - feature/*
      - release/v*
      - testing/**

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pnpm setup
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm biome:lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pnpm setup
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pnpm setup
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma setup
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

      - name: Run unit tests
        run: pnpm test -- --runInBand

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pnpm setup
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma setup
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

      - name: Build project
        run: pnpm build