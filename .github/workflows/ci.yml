name: CI

on:
  push:
    branches:
      - main
      - feature/*
      - bugfix/*
      - hotfix/*
      - release/*
      - testing

  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run biome:lint

      - name: Run unit tests
        run: npm run test -- --runInBand

      - name: Build project
        run: npm run build
